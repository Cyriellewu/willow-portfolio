<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 470" role="img" aria-labelledby="title desc">
  <title id="title">From messy industrial evidence to aligned maintenance windows and a weighted relationship graph</title>
  <desc id="desc">A three-stage synthetic illustration. Misaligned fault logs and operational readings are reframed around maintenance outcomes, aligned into chassis histories, and converted into a graph with temporal, contextual, and co-occurrence edges.</desc>
  <rect width="1320" height="470" fill="#fffefa"/>
  <style>
    .ink{stroke:#222e26;fill:none;stroke-width:2}
    .soft{stroke:#a3aaa1;fill:none;stroke-width:1.5}
    .guide{stroke:#d2d4cc;fill:none;stroke-width:1.2;stroke-dasharray:5 6}
    .time{stroke:#4e6858;fill:none;stroke-width:4}
    .context{stroke:#c76852;fill:none;stroke-width:3}
    .pattern{stroke:#5f7f9d;fill:none;stroke-width:3;stroke-dasharray:7 5}
    .node{fill:#fffefa;stroke:#222e26;stroke-width:2}
    .node-a{fill:#4e6858;stroke:#fffefa;stroke-width:2}
    .node-b{fill:#c76852;stroke:#fffefa;stroke-width:2}
    .node-c{fill:#5f7f9d;stroke:#fffefa;stroke-width:2}
    .warn{fill:#fff3ef;stroke:#c76852;stroke-width:1.5}
    text{font-family:"Source Sans 3","Segoe UI",Arial,sans-serif;fill:#222e26}
    .mono{font-family:"IBM Plex Mono",Consolas,monospace;letter-spacing:.06em}
    .muted{fill:#728578}
    .small{font-size:12px}
  </style>

  <!-- Stage 00: messy evidence -->
  <text x="34" y="38" font-size="17" font-weight="700">00 / Messy evidence</text>
  <text x="34" y="62" font-size="12" class="muted">Large source volume, but no dependable outcome yet</text>
  <rect x="30" y="84" width="350" height="320" class="guide"/>

  <rect x="52" y="105" width="140" height="56" class="soft"/>
  <text x="70" y="130" font-size="14" font-weight="700">Fault logs</text>
  <text x="70" y="150" class="mono muted small">events · codes · time</text>
  <circle cx="64" cy="192" r="8" class="node-a"/><circle cx="96" cy="218" r="8" class="node-c"/>
  <circle cx="132" cy="184" r="8" class="node-b"/><circle cx="178" cy="225" r="8" class="node-a"/>
  <circle cx="218" cy="198" r="8" class="node-c"/><circle cx="252" cy="235" r="8" class="node-b"/>
  <circle cx="298" cy="187" r="8" class="node-a"/><circle cx="340" cy="217" r="8" class="node-c"/>
  <path d="M52 253 C82 218 100 289 130 253 S180 217 210 253 S260 288 290 253 S330 218 358 253" class="soft"/>

  <rect x="218" y="105" width="140" height="56" class="soft"/>
  <text x="236" y="130" font-size="14" font-weight="700">Operations</text>
  <text x="236" y="150" class="mono muted small">readings · gaps</text>
  <path d="M55 292 H125 M152 292 H212 M244 292 H305 M333 292 H356" class="ink"/>
  <text x="126" y="297" font-size="19" class="muted">?</text>
  <text x="214" y="297" font-size="19" class="muted">?</text>
  <text x="306" y="297" font-size="19" class="muted">?</text>

  <rect x="52" y="330" width="306" height="51" class="warn"/>
  <text x="69" y="351" font-size="13" font-weight="700">Missing could mean rest, offline,</text>
  <text x="69" y="370" font-size="13" font-weight="700">failure, or a collection gap.</text>

  <!-- transition 00 -> 01 -->
  <path d="M398 228 H438" class="ink"/>
  <path d="M426 215 L440 228 L426 241" class="ink"/>
  <text x="393" y="197" class="mono muted small">CLARIFY</text>
  <text x="390" y="257" class="mono muted small">THE TARGET</text>

  <!-- Stage 01: aligned windows -->
  <text x="462" y="38" font-size="17" font-weight="700">01 / Maintenance-linked windows</text>
  <text x="462" y="62" font-size="12" class="muted">Fault histories aligned to outcomes for each chassis</text>
  <rect x="458" y="84" width="388" height="320" class="guide"/>

  <text x="478" y="113" class="mono muted small">CHASSIS A</text>
  <text x="478" y="203" class="mono muted small">CHASSIS B</text>
  <text x="478" y="293" class="mono muted small">CHASSIS C</text>
  <line x1="488" y1="145" x2="758" y2="145" class="soft"/>
  <line x1="488" y1="235" x2="758" y2="235" class="soft"/>
  <line x1="488" y1="325" x2="758" y2="325" class="soft"/>

  <path d="M488 137 C510 103 532 178 554 138 S598 103 620 138 S664 177 686 138 S730 104 752 138" class="ink"/>
  <path d="M488 227 C510 193 532 268 554 228 S598 193 620 228 S664 267 686 228 S730 194 752 228" class="ink"/>
  <path d="M488 317 C510 283 532 358 554 318 S598 283 620 318 S664 357 686 318 S730 284 752 318" class="ink"/>

  <line x1="520" y1="145" x2="520" y2="172" class="soft"/><circle cx="520" cy="176" r="8" class="node-a"/>
  <line x1="566" y1="145" x2="566" y2="164" class="soft"/><circle cx="566" cy="168" r="8" class="node-c"/>
  <line x1="624" y1="145" x2="624" y2="179" class="soft"/><circle cx="624" cy="183" r="8" class="node-b"/>
  <line x1="694" y1="145" x2="694" y2="165" class="soft"/><circle cx="694" cy="169" r="8" class="node-a"/>

  <line x1="532" y1="235" x2="532" y2="264" class="soft"/><circle cx="532" cy="268" r="8" class="node-b"/>
  <line x1="588" y1="235" x2="588" y2="277" class="soft"/><circle cx="588" cy="281" r="8" class="node-a"/>
  <line x1="651" y1="235" x2="651" y2="263" class="soft"/><circle cx="651" cy="267" r="8" class="node-c"/>
  <line x1="710" y1="235" x2="710" y2="274" class="soft"/><circle cx="710" cy="278" r="8" class="node-b"/>

  <line x1="511" y1="325" x2="511" y2="353" class="soft"/><circle cx="511" cy="357" r="8" class="node-c"/>
  <line x1="570" y1="325" x2="570" y2="346" class="soft"/><circle cx="570" cy="350" r="8" class="node-b"/>
  <line x1="631" y1="325" x2="631" y2="362" class="soft"/><circle cx="631" cy="366" r="8" class="node-a"/>
  <line x1="697" y1="325" x2="697" y2="347" class="soft"/><circle cx="697" cy="351" r="8" class="node-c"/>

  <line x1="488" y1="384" x2="757" y2="384" class="ink"/>
  <path d="M746 376 L758 384 L746 392" class="ink"/>
  <text x="536" y="421" class="mono muted small">HISTORY BEFORE MAINTENANCE OUTCOME</text>

  <!-- transition 01 -> 02 -->
  <path d="M864 228 H904" class="ink"/>
  <path d="M892 215 L906 228 L892 241" class="ink"/>
  <text x="863" y="197" class="mono muted small">MAKE</text>
  <text x="854" y="257" class="mono muted small">RELATIONS</text>
  <text x="856" y="276" class="mono muted small">EXPLICIT</text>

  <!-- Stage 02: weighted graph -->
  <text x="928" y="38" font-size="17" font-weight="700">02 / Weighted relationship graph</text>
  <text x="928" y="62" font-size="12" class="muted">Events become nodes; evidence becomes typed edges</text>

  <line x1="968" y1="132" x2="1051" y2="101" class="time"/>
  <line x1="1051" y1="101" x2="1150" y2="139" class="time"/>
  <line x1="1150" y1="139" x2="1202" y2="225" class="time"/>
  <line x1="1202" y1="225" x2="1166" y2="329" class="time"/>
  <line x1="1166" y1="329" x2="1061" y2="366" class="time"/>
  <line x1="1061" y1="366" x2="962" y2="307" class="time"/>
  <line x1="962" y1="307" x2="940" y2="216" class="time"/>
  <line x1="940" y1="216" x2="968" y2="132" class="time"/>

  <line x1="968" y1="132" x2="1150" y2="139" class="context"/>
  <line x1="1051" y1="101" x2="1202" y2="225" class="context"/>
  <line x1="940" y1="216" x2="1061" y2="366" class="context"/>
  <line x1="962" y1="307" x2="1166" y2="329" class="context"/>

  <line x1="968" y1="132" x2="1166" y2="329" class="pattern"/>
  <line x1="1051" y1="101" x2="962" y2="307" class="pattern"/>
  <line x1="1150" y1="139" x2="1061" y2="366" class="pattern"/>
  <line x1="940" y1="216" x2="1202" y2="225" class="pattern"/>
  <line x1="1051" y1="101" x2="1166" y2="329" class="pattern"/>

  <circle cx="968" cy="132" r="15" class="node-a"/><circle cx="1051" cy="101" r="15" class="node-c"/>
  <circle cx="1150" cy="139" r="15" class="node-b"/><circle cx="1202" cy="225" r="15" class="node-c"/>
  <circle cx="1166" cy="329" r="15" class="node-a"/><circle cx="1061" cy="366" r="15" class="node-b"/>
  <circle cx="962" cy="307" r="15" class="node-c"/><circle cx="940" cy="216" r="15" class="node-b"/>
  <circle cx="1073" cy="230" r="19" class="node"/><text x="1054" y="235" class="mono small">target</text>

  <g transform="translate(930 407)">
    <line x1="0" y1="0" x2="39" y2="0" class="time"/><text x="48" y="4" class="small">temporal</text>
    <line x1="133" y1="0" x2="172" y2="0" class="context"/><text x="181" y="4" class="small">context</text>
    <line x1="0" y1="30" x2="39" y2="30" class="pattern"/><text x="48" y="34" class="small">co-occurrence</text>
  </g>
</svg>
